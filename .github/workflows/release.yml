# Publish to NuGet.org and create GitHub Release when a version tag is pushed.
# Usage: git tag v1.2.3 && git push origin v1.2.3
# Add your NuGet.org API key as repository secret: NUGET_API_KEY
# Create key at: https://www.nuget.org/account/apikeys

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # for reading and writing repository contents, releases, tags, etc.

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore TypedPaths.Generator/TypedPaths.Generator.csproj

      - name: Format (verify)
        run: dotnet format TypedPaths.Generator/TypedPaths.Generator.csproj --verify-no-changes

      - name: Build
        run: dotnet build TypedPaths.Generator/TypedPaths.Generator.csproj --no-restore -c Release

      - name: Pack
        run: dotnet pack TypedPaths.Generator/TypedPaths.Generator.csproj --no-build -c Release -o nupkg -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Verify packaged targets file
        run: |
          python - <<'PY'
          import glob
          import sys
          import zipfile

          packages = sorted(glob.glob("nupkg/*.nupkg"))
          if not packages:
              print("No .nupkg files were produced in nupkg/")
              sys.exit(1)

          required_entry = "buildTransitive/TypedPaths.Generator.targets"
          missing = []
          for package in packages:
              with zipfile.ZipFile(package) as archive:
                  entries = set(archive.namelist())
                  if required_entry not in entries:
                      missing.append(package)

          if missing:
              print("Missing required entry in:")
              for package in missing:
                  print(f" - {package}")
              sys.exit(1)

          print(f"Verified {required_entry} in {len(packages)} package(s).")
          PY

      - name: Push to NuGet.org
        run: dotnet nuget push nupkg/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: nupkg/*.nupkg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
